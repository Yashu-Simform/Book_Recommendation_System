
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BookHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #6a11cb, #2575fc);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      margin-top: 100px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    .card-body {
      padding: 2.5rem;
    }
    .form-control {
      border-radius: 10px;
    }
    .btn-primary, .btn-dark {
      border-radius: 10px;
    }
    .logo {
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>
<div class="logo">📚 Book<span style="color: #ffd700">Hub</span></div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card">
        <div class="card-body">
          <h3 class="text-center mb-4 text-primary">Sign In to BookHub</h3>
          <form id="loginForm">
            <div class="mb-3">
              <label for="username" class="form-label">Email address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <input type="email" class="form-control" id="username" name="username" placeholder="Enter your email" required />
              </div>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required />
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
            <div class="text-center mb-2">
              <a href="signup.html" class="text-decoration-none">Don't have an account? <strong>Sign up</strong></a>
            </div>
            <div class="text-center">
              <a href="http://localhost:8000/auth/github" class="btn btn-dark w-100">
                <i class="fab fa-github me-2"></i>Login with GitHub
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const BASE_URL = "http://localhost:8000";

const form = document.getElementById("loginForm");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = new FormData(form);
  const response = await fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    body: formData,
  });
  if (response.ok) {
    const data = await response.json();
    localStorage.setItem("access_token", data.access_token);
    window.location.href = "index.html";
  } else {
    alert("Login failed. Please check your credentials.");
  }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
