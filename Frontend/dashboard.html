<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookHub - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .navbar-brand span {
      color: #ffc107;
    }
    .book-card {
      transition: transform 0.2s;
    }
    .book-card:hover {
      transform: translateY(-5px);
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">📚 Book<span>Hub</span></a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item">
          <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Recommended Books</h3>
    <input type="text" class="form-control w-25" id="searchInput" placeholder="Search by title..." onkeyup="filterBooks()" />
  </div>
  <div class="row" id="booksContainer">
    <!-- Dynamic book cards -->
  </div>
</div>

<script>
const BASE_URL = "http://localhost:8000";

document.addEventListener("DOMContentLoaded", fetchBooks);

async function fetchBooks() {
  const token = localStorage.getItem("access_token");
  if (!token) {
    return window.location.href = "auth.html";
  }

  try {
    const res = await fetch(`${BASE_URL}/books/get-books`, {
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });
    const books = await res.json();
    renderBooks(books);
  } catch (err) {
    alert("Failed to load books. Please try again.");
  }
}

function renderBooks(books) {
  const container = document.getElementById("booksContainer");
  container.innerHTML = "";
  books.forEach(book => {
    container.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card book-card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">${book.title}</h5>
            <p class="card-text">Author: ${book.author}</p>
            <p class="card-text">Rating: ${book.avg_rating?.toFixed(1) ?? 'Not rated yet'}</p>
            <a href="book.html?id=${book.id}" class="btn btn-primary">View</a>
          </div>
        </div>
      </div>
    `;
  });
}

function filterBooks() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const cards = document.querySelectorAll("#booksContainer .card");
  cards.forEach(card => {
    const title = card.querySelector(".card-title").innerText.toLowerCase();
    card.closest(".col-md-4").style.display = title.includes(query) ? "block" : "none";
  });
}

function logout() {
  localStorage.removeItem("access_token");
  window.location.href = "auth.html";
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
