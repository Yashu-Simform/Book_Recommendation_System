<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Recommendation Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            padding-top: 60px;
            background-color: #f5f5f5;
        }
        .card {
            border-radius: 15px;
        }
        .navbar-brand span {
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <script>
        const BASE_URL = "http://localhost:8000";
    </script>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Book<span>Hub</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-outline-light me-2" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Container -->
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>All Books</h2>
            <input type="text" id="searchInput" class="form-control w-25" placeholder="Search by title..." onkeyup="filterBooks()">
        </div>
        <div class="row" id="booksContainer">
            <!-- Books will be dynamically injected here -->
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchBooks();
        });

        async function fetchBooks() {
            const token = localStorage.getItem("access_token");
            if (!token) return window.location.href = "/login.html";

            try {
                const response = await fetch(`${BASE_URL}/books/get-books`, {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error("Failed to fetch books");

                const books = await response.json();
                renderBooks(books);
            } catch (error) {
                console.error(error);
                alert("Error loading books");
            }
        }

        function renderBooks(books) {
            const container = document.getElementById("booksContainer");
            container.innerHTML = "";
            books.forEach(book => {
                container.innerHTML += `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${book.title}</h5>
                                <p class="card-text"><strong>Author:</strong> ${book.author}</p>
                                <p class="card-text"><strong>Rating:</strong> ${book.avg_rating?.toFixed(1) ?? 'Not rated yet'}</p>
                                <a href="book.html?id=${book.id}" class="btn btn-primary">View Details</a>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterBooks() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const cards = document.querySelectorAll("#booksContainer .col-md-4");
            cards.forEach(card => {
                const title = card.querySelector(".card-title").innerText.toLowerCase();
                card.style.display = title.includes(query) ? "block" : "none";
            });
        }

        function logout() {
            localStorage.removeItem("access_token");
            window.location.href = "/login.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
